<div class="min-h-screen bg-gray-50">
  <div class="flex justify-center items-start pt-16 px-4">
    <div class="bg-white rounded-2xl shadow-sm p-8 w-full max-w-md">
      <h1 class="text-2xl font-bold">Login</h1>
      <p class="text-gray-500 mt-1 pb-4 border-b border-gray-200">Welcome back to Magic Box</p>
      <div class="mt-6">
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          placeholder="Enter your email"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#AB95F9]"
        />
      </div>
      <div class="mt-4">
        <label class="block text-sm font-medium mb-1">Password</label>
        <div class="relative">
          <!-- NEET TO CHECK ANOTHER SOLUTOIN FOR $any -->
          <input
            type="password"
            placeholder="Enter your password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-[#AB95F9]"
          />
        </div>
      </div>
      <div class="flex justify-end mt-2">
        <a href="#" class="text-sm text-[#AB95F9] font-medium">Forgot password?</a>
      </div>
      <div class="flex items-center gap-2 mt-4">
        <input
          type="checkbox"
          id="remember"
          [checked]="rememberMe()"
          (change)="rememberMe.set($any($event.target).checked)"
          class="w-4 h-4 accent-[#AB95F9]"
        />
        <label for="remember" class="text-sm text-gray-700">Remember me</label>
      </div>
      <button
        (click)="submit()"
        class="w-full border-2 border-[#AB95F9] text-[#AB95F9] font-semibold rounded-full py-3 mt-6"
      >
        Login
      </button>
      <div class="flex items-center gap-3 mt-6">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-sm text-gray-400">or</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>
      <p class="text-center text-sm mt-4">
        Don't have an account?
        <a href="#" class="text-[#AB95F9] font-medium">Sign up</a>
      </p>
    </div>
  </div>
</div>
