<header class="bg-[#AB95F9] border-b border-gray-300 px-6 py-4 flex items-center justify-between">
  <h3 class="text-white text-xl font-semibold">MAGIX</h3>
    @if (!isLoginRoute && isAuthenticated()) {
      <div class="flex items-center">
        <p class="text-white mr-4">Welcome, {{ profile()!.firstName }}</p>
        <button
          (click)="logout()"
          class="text-white cursor-pointer hover:bg-white hover:text-[#AB95F9] transition-colors duration-400 border border-white rounded-full px-4 py-1.5 text-sm font-medium"
        >
          Logout
        </button>
      </div>
    } @else if(!isLoginRoute) {
      <a
        routerLink="/login"
        class="text-white border hover:bg-white hover:text-[#AB95F9] transition-colors duration-400 border-white rounded-full px-4 py-1.5 text-sm font-medium"
      >
        Login
      </a>
    }
</header>
