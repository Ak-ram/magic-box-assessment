<div class="bg-[#AB95F9]/10 rounded-2xl p-6 h-fit">
  <h2 class="text-lg font-semibold">Summary</h2>
  <p class="text-gray-500 text-sm mb-4">of your purchase</p>
  <div class="flex justify-between items-start mb-4">
    <p class="font-medium">Magic Box</p>
    <p class="font-medium">USD {{ subtotal() }}</p>
  </div>
  <div class="space-y-2 text-sm border-t border-[#AB95F9]/30 pt-4">
    <div class="flex justify-between">
      <span class="text-gray-500">Subtotal</span>
      <span class="font-medium">USD {{ subtotal() }}</span>
    </div>
    <div class="flex justify-between">
      <span class="text-gray-500">Shipping</span>
      <span class="font-medium">Free</span>
    </div>
    <div class="flex justify-between">
      <span class="text-gray-500">Taxes</span>
      <span class="font-medium">USD {{ taxes() }}</span>
    </div>
  </div>
  <div class="flex justify-between font-semibold border-t border-[#AB95F9]/30 mt-4 pt-4">
    <span>Total</span>
    <div class="text-right">
      <p>USD {{ total() }}</p>
    </div>
  </div>
</div>
<div class="flex flex-wrap translate-x-3 h-67.5 overflow-auto mt-4 gap-2">
  @for (child of children(); track child;) {
    <img class="w-21.25 h-25" alt="" src="boy.png" />
  }
</div>
